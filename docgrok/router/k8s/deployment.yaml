apiVersion: apps/v1
kind: Deployment
metadata:
  name: docgrok-router
  namespace: docgrok
  labels:
    app: docgrok-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docgrok-router
  template:
    metadata:
      labels:
        app: docgrok-router
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: docgrok-sa
      containers:
      - name: router
        image: <internal-acr>.azurecr.io/docgrok-router:v1
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: NAMESPACE
          value: "docgrok"
        - name: RUST_LOG
          value: "docgrok_router=info"
        - name: DSE_QWEN2_URL
          value: "http://dse-qwen2-svc:8000"
        - name: CLIP_URL
          value: "http://clip-svc:8000"
        - name: BGE_URL
          value: "http://bge-svc:8000"
        - name: BGE_SMALL_URL
          value: "http://bge-small-svc:8000"
        - name: COSMOS_ENDPOINT
          value: "https://omnivec-cosmos.documents.azure.com:443"
        - name: COSMOS_DATABASE
          value: "omnivec"
        - name: COSMOS_CONTAINER
          value: "metadata"
        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"
          limits:
            cpu: "2000m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: docgrok-router
  namespace: docgrok
spec:
  selector:
    app: docgrok-router
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
