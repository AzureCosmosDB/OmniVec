# DSE-Qwen2 - Visual Document Embedding Service (Internal)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dse-qwen2
  namespace: docgrok
  labels:
    app: dse-qwen2
    component: embedding
    omnivec/role: model
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dse-qwen2
  template:
    metadata:
      labels:
        app: dse-qwen2
        component: embedding
    omnivec/role: model
    spec:
      containers:
      - name: dse-qwen2
        image: <internal-acr>.azurecr.io/docgrok-dse-qwen2:v1
        ports:
        - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1
            memory: "16Gi"
            cpu: "4"
        env:
        - name: HF_HOME
          value: "/app/.cache/huggingface"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dse-qwen2-svc
  namespace: docgrok
  labels:
    app: dse-qwen2
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: dse-qwen2
