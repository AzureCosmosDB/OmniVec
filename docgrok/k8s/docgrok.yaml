# DocGrok - Orchestrator Service (External)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docgrok
  namespace: docgrok
  labels:
    app: docgrok
    component: orchestrator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: docgrok
  template:
    metadata:
      labels:
        app: docgrok
        component: orchestrator
    spec:
      containers:
      - name: docgrok
        image: cdbmvsacr4cc259.azurecr.io/docgrok:v1
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
        env:
        - name: DSE_QWEN2_URL
          value: "http://dse-qwen2-svc:8000"
        - name: CLIP_URL
          value: "http://clip-svc:8000"
        - name: MAX_CONCURRENT_REQUESTS
          value: "100"
        - name: MAX_CONCURRENT_PER_BACKEND
          value: "40"
        - name: CONNECTION_POOL_SIZE
          value: "200"
        - name: REQUEST_TIMEOUT
          value: "600"
        - name: MODEL_STORE_TYPE
          value: "cosmosdb"
        - name: COSMOS_ENDPOINT
          value: "https://omnivec-cosmos.documents.azure.com:443/"
        - name: COSMOS_DATABASE
          value: "omnivec"
        - name: COSMOS_CONTAINER
          value: "metadata"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: docgrok
  namespace: docgrok
  labels:
    app: docgrok
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: docgrok
