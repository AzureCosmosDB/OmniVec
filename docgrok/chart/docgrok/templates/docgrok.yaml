{{- if .Values.docgrok.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docgrok
  namespace: {{ .Values.global.namespace }}
  labels:
    app: docgrok
    component: orchestrator
spec:
  replicas: {{ .Values.docgrok.replicaCount }}
  selector:
    matchLabels:
      app: docgrok
  template:
    metadata:
      labels:
        app: docgrok
        component: orchestrator
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: docgrok-sa
      containers:
      - name: docgrok
        image: {{ .Values.global.imageRegistry }}/{{ .Values.docgrok.image.repository }}:{{ .Values.docgrok.image.tag }}
        ports:
        - containerPort: {{ .Values.docgrok.service.targetPort }}
        resources:
          requests:
            memory: {{ .Values.docgrok.resources.requests.memory | quote }}
            cpu: {{ .Values.docgrok.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.docgrok.resources.limits.memory | quote }}
            cpu: {{ .Values.docgrok.resources.limits.cpu | quote }}
        env:
        - name: DSE_QWEN2_URL
          value: {{ .Values.docgrok.env.DSE_QWEN2_URL | quote }}
        - name: CLIP_URL
          value: {{ .Values.docgrok.env.CLIP_URL | quote }}
        - name: BGE_URL
          value: {{ .Values.docgrok.env.BGE_URL | quote }}
        - name: NAMESPACE
          value: {{ .Values.global.namespace | quote }}
        - name: PROVIDERS_CONFIG_PATH
          value: "/etc/docgrok/providers.json"
        {{- range $name, $provider := .Values.providers }}
        {{- if $provider.enabled }}
        - name: PROVIDER_{{ $name | upper | replace "-" "_" }}_API_KEY
          valueFrom:
            secretKeyRef:
              name: docgrok-providers
              key: {{ $name }}-api-key
        {{- end }}
        {{- end }}
        volumeMounts:
        - name: providers-config
          mountPath: /etc/docgrok
          readOnly: true
        livenessProbe:
          httpGet:
            path: {{ .Values.docgrok.probes.liveness.path }}
            port: {{ .Values.docgrok.service.targetPort }}
          initialDelaySeconds: {{ .Values.docgrok.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.docgrok.probes.liveness.periodSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.docgrok.probes.readiness.path }}
            port: {{ .Values.docgrok.service.targetPort }}
          initialDelaySeconds: {{ .Values.docgrok.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.docgrok.probes.readiness.periodSeconds }}
      volumes:
      - name: providers-config
        configMap:
          name: docgrok-providers-config
---
apiVersion: v1
kind: Service
metadata:
  name: docgrok
  namespace: {{ .Values.global.namespace }}
  labels:
    app: docgrok
spec:
  type: {{ .Values.docgrok.service.type }}
  ports:
  - port: {{ .Values.docgrok.service.port }}
    targetPort: {{ .Values.docgrok.service.targetPort }}
  selector:
    app: docgrok
{{- end }}
