apiVersion: v1
kind: ConfigMap
metadata:
  name: docgrok-providers-config
  namespace: {{ .Values.global.namespace }}
data:
  providers.json: |
    {
      {{- $first := true }}
      {{- range $name, $provider := .Values.providers }}
      {{- if $provider.enabled }}
      {{- if not $first }},{{ end }}
      "{{ $name }}": {
        "type": "{{ $provider.type }}",
        "endpoint": "{{ $provider.endpoint }}",
        "api_version": "{{ $provider.apiVersion }}",
        "models": {
          {{- $firstModel := true }}
          {{- range $modelName, $modelConfig := $provider.models }}
          {{- if not $firstModel }},{{ end }}
          "{{ $modelName }}": {
            "deployment": "{{ $modelConfig.deployment }}",
            "embedding_dim": {{ $modelConfig.embeddingDim }}
          }
          {{- $firstModel = false }}
          {{- end }}
        }
      }
      {{- $first = false }}
      {{- end }}
      {{- end }}
    }
