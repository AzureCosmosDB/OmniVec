# OmniVec — azd project definition
name: omnivec
metadata:
  template: omnivec@0.0.1

infra:
  provider: bicep
  path: ./infra
  module: main

hooks:
  preprovision:
    posix:
      shell: sh
      run: ./hooks/preprovision.sh
      interactive: true
      continueOnError: false
    windows:
      shell: pwsh
      run: ./hooks/preprovision.ps1
      interactive: true
      continueOnError: false
  postprovision:
    posix:
      shell: sh
      run: ./hooks/postprovision.sh
      interactive: true
      continueOnError: false
    windows:
      shell: pwsh
      run: ./hooks/postprovision.ps1
      interactive: true
      continueOnError: false
