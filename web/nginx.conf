# HTTP server — redirect to HTTPS if TLS cert is present
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:;" always;

    # Serve the UI at /ui
    location = /ui {
        try_files /index.html =404;
    }

    # Serve static assets
    location /static/ {
        try_files $uri =404;
    }

    # Proxy all API calls to the omnivec-api service
    location /api/ {
        proxy_pass http://omnivec-api:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy health endpoint
    location /health {
        proxy_pass http://omnivec-api:80;
        proxy_set_header Host $host;
    }

    # Web container health check
    location = /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
