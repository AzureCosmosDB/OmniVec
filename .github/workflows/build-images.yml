name: build-and-push-images

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_override:
        description: "Override tag to push (e.g. hotfix-2026-04-22). Leave empty to use branch/tag defaults."
        required: false
        default: ""

env:
  # Common source-of-truth registry. Every env-specific ACR imports from here.
  REGISTRY: omnivecregistry.azurecr.io

permissions:
  contents: read
  # RES-3: cosign keyless signing uses GitHub OIDC tokens issued by the
  # workflow run. id-token=write is the minimum permission required.
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: omnivec-api
            context: .
            dockerfile: Dockerfile
          - image: omnivec-search
            context: .
            dockerfile: search/Dockerfile
          - image: omnivec-web
            context: web
            dockerfile: web/Dockerfile
          - image: omnivec-changefeed
            context: connectors/ingestion/dotnet
            dockerfile: connectors/ingestion/dotnet/Dockerfile
          - image: omnivec-dotnet-worker
            context: connectors/worker/dotnet
            dockerfile: connectors/worker/dotnet/Dockerfile
          - image: docgrok-router
            context: docgrok/router
            dockerfile: docgrok/router/Dockerfile
          - image: docgrok-pipeline-worker
            context: docgrok/pipeline-worker
            dockerfile: docgrok/pipeline-worker/Dockerfile

    steps:
      - name: Checkout OmniVec
        uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAGS=()
          OVERRIDE="${{ github.event.inputs.tag_override }}"
          if [ -n "$OVERRIDE" ]; then
            TAGS+=("$OVERRIDE")
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            SEMVER="${GITHUB_REF#refs/tags/}"
            TAGS+=("stable" "$SEMVER")
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS+=("stable")
          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            TAGS+=("dev")
          else
            TAGS+=("${GITHUB_REF_NAME//\//-}")
          fi
          TAGS+=("sha-$SHORT_SHA")
          DOCKER_TAGS=""
          for t in "${TAGS[@]}"; do
            DOCKER_TAGS+="${REGISTRY}/${{ matrix.image }}:$t,"
          done
          DOCKER_TAGS="${DOCKER_TAGS%,}"
          {
            echo "docker_tags=$DOCKER_TAGS"
          } >> "$GITHUB_OUTPUT"
          echo "Computed tags for ${{ matrix.image }}:"
          printf '  - %s\n' "${TAGS[@]}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ACR login (scope-map token)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.docker_tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image }}:buildcache,mode=max

      # RES-3 — cosign keyless signing using GitHub OIDC. Signatures land
      # in the same OCI registry next to the image (works on any
      # OCI-compliant registry including ACR; no ACR-side cosign feature
      # toggle required). Verify with:
      #   cosign verify <REGISTRY>/<image>@<digest> \
      #     --certificate-identity=<workflow-url> \
      #     --certificate-oidc-issuer=https://token.actions.githubusercontent.com
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.0

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.tags.outputs.docker_tags }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          if [[ -z "${DIGEST}" ]]; then
            echo "no digest from build step; skipping signing" >&2
            exit 0
          fi
          # The build step pushes multiple tags pointing at the same
          # digest, so we sign by digest once. Each unique repo:digest
          # gets a sigstore record.
          declare -A seen=()
          IFS=',' read -ra refs <<< "${TAGS}"
          for ref in "${refs[@]}"; do
            ref="${ref%% }"
            ref="${ref## }"
            [[ -z "${ref}" ]] && continue
            repo="${ref%%:*}"
            target="${repo}@${DIGEST}"
            if [[ -n "${seen[$target]:-}" ]]; then
              continue
            fi
            seen[$target]=1
            echo "cosign sign --yes ${target}"
            cosign sign --yes "${target}"
          done
