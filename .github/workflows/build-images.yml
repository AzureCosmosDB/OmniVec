name: build-and-push-images

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_override:
        description: "Override tag to push (e.g. hotfix-2026-04-22). Leave empty to use branch/tag defaults."
        required: false
        default: ""

env:
  # Common source-of-truth registry. Every env-specific ACR imports from here.
  REGISTRY: omnivecregistry.azurecr.io

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: omnivec-api
            context: .
            dockerfile: Dockerfile
          - image: omnivec-web
            context: web
            dockerfile: web/Dockerfile
          - image: omnivec-changefeed
            context: connectors/ingestion/dotnet
            dockerfile: connectors/ingestion/dotnet/Dockerfile
          # docgrok-router and docgrok-pipeline-worker are built manually for now;
          # their submodule (AzureCosmosDB/DocGrok) requires a PAT that is blocked
          # by org policy. Re-enable once a deploy key or approved token is in place.

    steps:
      - name: Checkout OmniVec
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAGS=()
          OVERRIDE="${{ github.event.inputs.tag_override }}"
          if [ -n "$OVERRIDE" ]; then
            TAGS+=("$OVERRIDE")
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            SEMVER="${GITHUB_REF#refs/tags/}"
            TAGS+=("stable" "$SEMVER")
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS+=("stable")
          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            TAGS+=("dev")
          else
            TAGS+=("${GITHUB_REF_NAME//\//-}")
          fi
          TAGS+=("sha-$SHORT_SHA")
          DOCKER_TAGS=""
          for t in "${TAGS[@]}"; do
            DOCKER_TAGS+="${REGISTRY}/${{ matrix.image }}:$t,"
          done
          DOCKER_TAGS="${DOCKER_TAGS%,}"
          {
            echo "docker_tags=$DOCKER_TAGS"
          } >> "$GITHUB_OUTPUT"
          echo "Computed tags for ${{ matrix.image }}:"
          printf '  - %s\n' "${TAGS[@]}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ACR login (scope-map token)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.docker_tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ matrix.image }}:buildcache,mode=max
