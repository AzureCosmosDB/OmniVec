{{- if and .Values.docgrok.enabled .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docgrok-controller
  namespace: {{ .Values.global.namespace }}
  labels:
    app: docgrok-controller
    component: controller
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      app: docgrok-controller
  template:
    metadata:
      labels:
        app: docgrok-controller
        component: controller
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: docgrok-sa
      containers:
      - name: controller
        image: {{ .Values.global.imageRegistry }}/{{ .Values.docgrok.image.repository }}:{{ .Values.docgrok.image.tag }}
        ports:
        - containerPort: {{ .Values.controller.port }}
        resources:
          requests:
            memory: {{ .Values.controller.resources.requests.memory | quote }}
            cpu: {{ .Values.controller.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.controller.resources.limits.memory | quote }}
            cpu: {{ .Values.controller.resources.limits.cpu | quote }}
        env:
        - name: DOCGROK_MODE
          value: "controller"
        - name: PORT
          value: {{ .Values.controller.port | quote }}
        - name: NAMESPACE
          value: {{ .Values.global.namespace | quote }}
        - name: DSE_QWEN2_URL
          value: {{ .Values.docgrok.env.DSE_QWEN2_URL | quote }}
        - name: CLIP_URL
          value: {{ .Values.docgrok.env.CLIP_URL | quote }}
        - name: BGE_URL
          value: {{ .Values.docgrok.env.BGE_URL | quote }}
        - name: COSMOS_ENDPOINT
          value: {{ .Values.azure.cosmos.endpoint | quote }}
        - name: COSMOS_DATABASE
          value: {{ .Values.azure.cosmos.database | quote }}
        - name: COSMOS_CONTAINER
          value: {{ .Values.azure.cosmos.container | quote }}
        - name: HEALTH_CHECK_INTERVAL
          value: {{ .Values.controller.healthCheckInterval | default "60" | quote }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.controller.port }}
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.controller.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: docgrok-controller
  namespace: {{ .Values.global.namespace }}
  labels:
    app: docgrok-controller
    component: controller
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.controller.port }}
    targetPort: {{ .Values.controller.port }}
  selector:
    app: docgrok-controller
{{- end }}
