{{- if .Values.api.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnivec-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: omnivec-api
    {{- include "omnivec.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: omnivec-api
  template:
    metadata:
      labels:
        app: omnivec-api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ include "omnivec.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: {{ .Values.global.imageRegistry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: AGENT_URL
              value: {{ .Values.agent.serviceUrl | default "http://omnivec-agent:8000" | quote }}
            {{- if .Values.agent.enabled }}
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agent.internalTokenSecret.name | default "omnivec-agent-internal" }}
                  key: {{ .Values.agent.internalTokenSecret.key | default "token" }}
                  optional: true
            {{- end }}
            - name: DOCGROK_URL
              value: {{ .Values.api.env.DOCGROK_URL | quote }}
            - name: COSMOS_ENDPOINT
              value: {{ .Values.azure.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.azure.cosmos.database | quote }}
            - name: AZURE_CLIENT_ID
              value: {{ .Values.azure.workloadIdentity.clientId | quote }}
            - name: ENABLE_BLOB_SOURCE
              value: {{ .Values.blobIngestor.enabled | default false | quote }}
            {{- if .Values.azure.subscriptionId }}
            - name: AZURE_SUBSCRIPTION_ID
              value: {{ .Values.azure.subscriptionId | quote }}
            {{- end }}
            {{- if .Values.azure.serviceBus.blobEventsQueueResourceId }}
            - name: OMNIVEC_BLOB_EVENT_QUEUE_RESOURCE_ID
              value: {{ .Values.azure.serviceBus.blobEventsQueueResourceId | quote }}
            {{- end }}
            {{- if .Values.api.adminToken }}
            - name: OMNIVEC_ADMIN_TOKEN
              value: {{ .Values.api.adminToken | quote }}
            {{- end }}
            {{- if .Values.search.internalToken }}
            - name: SEARCH_INTERNAL_TOKEN
              value: {{ .Values.search.internalToken | quote }}
            {{- end }}
            - name: SEARCH_SERVICE_URL
              value: {{ .Values.api.searchServiceUrl | default "http://omnivec-search" | quote }}
            {{- if .Values.azure.keyVault.uri }}
            - name: KEY_VAULT_URI
              value: {{ .Values.azure.keyVault.uri | quote }}
            {{- end }}
            {{- if .Values.azure.appInsights.connectionString }}
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: {{ .Values.azure.appInsights.connectionString | quote }}
            {{- if .Values.azure.appInsights.workspaceId }}
            - name: LOG_ANALYTICS_WORKSPACE_ID
              value: {{ .Values.azure.appInsights.workspaceId | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.liveness.path }}
              port: {{ .Values.api.probes.liveness.port }}
            initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.readiness.path }}
              port: {{ .Values.api.probes.readiness.port }}
            initialDelaySeconds: {{ .Values.api.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
---
apiVersion: v1
kind: Service
metadata:
  name: omnivec-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app: omnivec-api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
      protocol: TCP
  selector:
    app: omnivec-api
{{- end }}
