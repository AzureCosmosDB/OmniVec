{{- if .Values.worker.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnivec-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    app: omnivec-worker
    {{- include "omnivec.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: omnivec-worker
  template:
    metadata:
      labels:
        app: omnivec-worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ include "omnivec.serviceAccountName" . }}
      containers:
        - name: worker
          image: {{ .Values.global.imageRegistry }}/{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command: ["python", "worker.py"]
          env:
            - name: COSMOS_ENDPOINT
              value: {{ .Values.azure.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.azure.cosmos.database | quote }}
            - name: DOCGROK_URL
              value: {{ .Values.api.env.DOCGROK_URL | quote }}
            - name: AZURE_CLIENT_ID
              value: {{ .Values.azure.workloadIdentity.clientId | quote }}
            - name: STORAGE_CONN_STRING
              valueFrom:
                secretKeyRef:
                  name: omnivec-storage
                  key: connection-string
                  optional: true
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- if .Values.worker.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omnivec-worker
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omnivec-worker
  minReplicas: {{ .Values.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.worker.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
