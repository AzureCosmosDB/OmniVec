{{- if .Values.blobWatcher.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnivec-blob-watcher
  namespace: {{ .Values.global.namespace }}
  labels:
    app: omnivec-blob-watcher
    {{- include "omnivec.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.blobWatcher.replicaCount }}
  selector:
    matchLabels:
      app: omnivec-blob-watcher
  template:
    metadata:
      labels:
        app: omnivec-blob-watcher
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ include "omnivec.serviceAccountName" . }}
      containers:
        - name: blob-watcher
          image: {{ .Values.global.imageRegistry }}/{{ .Values.blobWatcher.image.repository }}:{{ .Values.blobWatcher.image.tag }}
          imagePullPolicy: {{ .Values.blobWatcher.image.pullPolicy }}
          command: ["python", "blob_watcher.py"]
          env:
            - name: COSMOS_ENDPOINT
              value: {{ .Values.azure.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.azure.cosmos.database | quote }}
            - name: DOCGROK_URL
              value: {{ .Values.api.env.DOCGROK_URL | quote }}
            - name: AZURE_CLIENT_ID
              value: {{ .Values.azure.workloadIdentity.clientId | quote }}
            - name: STORAGE_CONN_STRING
              valueFrom:
                secretKeyRef:
                  name: omnivec-storage
                  key: connection-string
                  optional: true
          resources:
            {{- toYaml .Values.blobWatcher.resources | nindent 12 }}
{{- end }}
