{{- if .Values.controller.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnivec-controller
  namespace: {{ .Values.global.namespace }}
  labels:
    app: omnivec-controller
    {{- include "omnivec.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicaCount }}
  selector:
    matchLabels:
      app: omnivec-controller
  template:
    metadata:
      labels:
        app: omnivec-controller
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: {{ include "omnivec.serviceAccountName" . }}
      containers:
        - name: controller
          image: {{ .Values.global.imageRegistry }}/{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          command: ["python", "controller.py"]
          env:
            - name: COSMOS_ENDPOINT
              value: {{ .Values.azure.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.azure.cosmos.database | quote }}
            - name: DOCGROK_URL
              value: {{ .Values.api.env.DOCGROK_URL | quote }}
            - name: AZURE_CLIENT_ID
              value: {{ .Values.azure.workloadIdentity.clientId | quote }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
{{- end }}
