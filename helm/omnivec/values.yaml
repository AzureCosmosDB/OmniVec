# OmniVec Helm Chart Values

global:
  namespace: omnivec
  imageRegistry: "" # Set to your ACR, e.g., myacr.azurecr.io

# =============================================================================
# OMNIVEC WEB (nginx — static UI + API proxy)
# =============================================================================
web:
  enabled: true
  replicaCount: 2
  image:
    repository: omnivec-web
    tag: latest
    pullPolicy: Always
  service:
    type: LoadBalancer
    port: 80
    targetPort: 8080
    dnsLabel: ""  # Set to get <label>.<region>.cloudapp.azure.com FQDN
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "250m"
  probes:
    liveness:
      path: /nginx-health
      initialDelaySeconds: 5
      periodSeconds: 30
    readiness:
      path: /nginx-health
      initialDelaySeconds: 3
      periodSeconds: 10

# =============================================================================
# OMNIVEC API (Control Plane)
# =============================================================================
api:
  enabled: true
  replicaCount: 2
  image:
    repository: omnivec-api
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1"
  probes:
    liveness:
      path: /health
      port: 8080
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      path: /health
      port: 8080
      initialDelaySeconds: 5
      periodSeconds: 10
  adminToken: ""  # Set via --set api.adminToken=<token> during deploy
  env:
    DOCGROK_URL: "http://docgrok:80"

# =============================================================================
# OMNIVEC SEARCH (Standalone multi-index vector search — externally exposed)
# =============================================================================
search:
  enabled: true
  replicaCount: 2
  image:
    repository: omnivec-search
    tag: latest
    pullPolicy: Always
  service:
    type: LoadBalancer     # external public IP
    port: 80
    targetPort: 8080
    dnsLabel: ""           # optional: <label>.<region>.cloudapp.azure.com
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1"
  probes:
    liveness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 30
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 10
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
  # Bootstrap/root search token (plaintext in values is fine for demos;
  # in production wire via --set or a Secret). Distinct from api.adminToken.
  bootstrapToken: ""
  # Internal s2s token — shared with api deployment via api.searchInternalToken.
  # api.py uses this to call search-svc for assistant RAG. Distinct from bootstrapToken.
  internalToken: ""
  # If true, accept tokens with scope=admin on search endpoints (not recommended).
  acceptAdminToken: "false"
  corsOrigins: "*"
  perIndexTimeoutS: 5
  totalTimeoutS: 15
  embedTimeoutS: 10
  rateLimitRpm: 0          # 0 = disabled
  env:
    DOCGROK_URL: ""        # optional override; defaults to api.env.DOCGROK_URL

# =============================================================================
# OMNIVEC CONTROLLER (bookkeeper — single replica)
# =============================================================================
controller:
  enabled: true
  replicaCount: 1
  image:
    repository: omnivec-api   # Same image, different entrypoint
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "500m"

# NOTE: Python worker removed. Job execution handled by .NET worker (dotnetWorker).

# =============================================================================
# COSMOS CHANGE FEED PROCESSOR (.NET — push model for CosmosDB sources)
# =============================================================================
changefeed:
  enabled: true
  replicaCount: 15
  image:
    repository: omnivec-changefeed
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 15
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70

# =============================================================================
# Blob Ingestor - Dedicated single-replica deployment for azure-blob sources.
# Runs the same image as changefeed but with EnableBlobSources=true,
# EnableCosmosSources=false. Keeps blob enumeration off the Cosmos CFP scale unit.
# Gated by ENABLE_BLOB_SOURCE in postprovision.sh; default false so azd deployments
# that don't enable blob never get an empty-config pod.
# =============================================================================
blobIngestor:
  enabled: false
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# =============================================================================
# DOTNET WORKER (.NET Service Bus worker for queue-mode embedding)
# =============================================================================
dotnetWorker:
  enabled: true
  replicaCount: 2
  image:
    repository: omnivec-dotnet-worker
    tag: latest
    pullPolicy: Always
  # Health/liveness HTTP port exposed by the worker (HealthEndpointService)
  healthPort: 8080
  probes:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    startup:
      failureThreshold: 30
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1"
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# =============================================================================
# BLOB ENUMERATOR (per-source blob enumeration with checkpointing)
# NOTE: These are created dynamically via API, not via Helm install
# =============================================================================
blobEnumerator:
  # Default settings for dynamically created enumerators
  image:
    repository: omnivec-api
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  env:
    ENUMERATION_INTERVAL: "60"
    PAGE_SIZE: "1000"

# =============================================================================
# SOURCE WORKER (per-source job processing with autoscaling)
# NOTE: These are created dynamically via API, not via Helm install
# =============================================================================
sourceWorker:
  # Default settings for dynamically created workers
  image:
    repository: omnivec-api
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2"
  autoscaling:
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# =============================================================================
# BLOB WATCHER (Event Grid → Storage Queue → job processing)
# =============================================================================
blobWatcher:
  enabled: false
  replicaCount: 1
  image:
    repository: omnivec-api
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1"

# =============================================================================
# AZURE CONFIGURATION
# =============================================================================
azure:
  # Managed Identity
  workloadIdentity:
    enabled: true
    clientId: "" # Set via --set azure.workloadIdentity.clientId=<from azd/bicep output>

  # CosmosDB
  cosmos:
    endpoint: "" # Set from Terraform output
    database: omnivec
    metadataContainer: metadata

  # Blob Storage
  storage:
    accountName: "" # Set from Terraform output
    blobEndpoint: "" # Set from Terraform output

  # Service Bus
  serviceBus:
    namespace: "" # Set from Terraform output
    jobsQueue: jobs
    embeddingsTopic: embeddings

  # Key Vault
  keyVault:
    uri: ""

  # Application Insights
  appInsights:
    connectionString: ""
    workspaceId: ""

# =============================================================================
# DOCGROK (in-repo)
# =============================================================================
docgrok:
  enabled: true
  global:
    namespace: omnivec
    imageRegistry: "" # Will use parent registry

  # DocGrok orchestrator (Rust router — default)
  docgrok:
    enabled: true
    replicaCount: 1
    image:
      repository: docgrok-router
      tag: latest
    service:
      type: ClusterIP
      port: 80
      targetPort: 8080
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "1"
    probes:
      liveness:
        path: /health
        initialDelaySeconds: 10
        periodSeconds: 30
      readiness:
        path: /health
        initialDelaySeconds: 5
        periodSeconds: 10
    env:
      DSE_QWEN2_URL: "http://dse-qwen2-svc:8000"
      CLIP_URL: "http://clip-svc:8000"
      BGE_URL: "http://bge-svc:8000"

  # DocGrok controller (background health checks, autoscaling)
  controller:
    enabled: true
    replicaCount: 1
    port: 8081
    healthCheckInterval: "60"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  # Pipeline Worker (PDF → OCR → Embedding via router; also handles text blobs)
  pipelineWorker:
    enabled: true
    replicaCount: 1
    image:
      repository: docgrok-pipeline-worker
      tag: latest
    service:
      name: pipeline-worker-svc
      port: 8080
      targetPort: 8080
    resources:
      requests:
        memory: "1Gi"
        cpu: "250m"
      limits:
        memory: "4Gi"
        cpu: "2"
    env:
      DOCGROK_ROUTER_URL: "http://docgrok:80"
      DEFAULT_MODEL_ID: ""

  # ML Models — disabled by default, start on-demand via UI/API
  models:
    embedding:
      dse-qwen2:
        enabled: false
        replicaCount: 1
        image:
          repository: dse-qwen2-api-ms
          tag: v6
        service:
          name: dse-qwen2-svc
          port: 8000
          targetPort: 8001
        resources:
          requests:
            memory: "16Gi"
            cpu: "4"
            nvidia.com/gpu: 1
          limits:
            memory: "24Gi"
            cpu: "8"
            nvidia.com/gpu: 1
        probes:
          liveness:
            path: /health
            port: 8001
            initialDelaySeconds: 120
            periodSeconds: 30
          readiness:
            path: /health
            port: 8001
            initialDelaySeconds: 120
            periodSeconds: 10

      clip:
        enabled: false
        replicaCount: 1
        image:
          repository: docgrok-clip
          tag: v8
        service:
          name: clip-svc
          port: 8000
          targetPort: 8000
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
            nvidia.com/gpu: 1
          limits:
            memory: "16Gi"
            cpu: "4"
            nvidia.com/gpu: 1
        probes:
          liveness:
            path: /health
            port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
          readiness:
            path: /health
            port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10

      bge:
        enabled: false
        replicaCount: 1
        image:
          repository: docgrok-bge
          tag: v2
        service:
          name: bge-svc
          port: 8000
          targetPort: 8000
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
            nvidia.com/gpu: 1
          limits:
            memory: "8Gi"
            cpu: "4"
            nvidia.com/gpu: 1
        probes:
          liveness:
            path: /health
            port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          readiness:
            path: /health
            port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

# =============================================================================
# INGRESS (Optional)
# =============================================================================
# T-ING-1 (closed): nginx is the default. Set `ingress.controller: traefik`
# to render the Traefik Middleware variant (templates/ingress-traefik.yaml)
# instead — it ships the same CSP / X-Frame-Options / rate-limit policy via
# the native Traefik CRD. Other controllers (AGIC, Istio) ignore the bundled
# annotations; in-process headers from api/api.py still apply.
ingress:
  enabled: false
  controller: nginx   # nginx | traefik | agic
  className: nginx
  annotations: {}
  hosts:
    - host: omnivec.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # AGIC (Azure Application Gateway Ingress Controller) — values consumed
  # by templates/ingress-agic.yaml when controller=agic. Rewrite rule sets
  # and WAF policies are managed on the App Gateway resource (out of
  # band); supply their names here.
  agic:
    rewriteRuleSet: ""        # e.g. "omnivec-security-headers"
    wafPolicy: ""             # e.g. "/subscriptions/.../wafPolicies/omnivec-waf"
    sslRedirect: "true"
    backendProtocol: "http"
  # Content-Security-Policy applied at the ingress layer (defence in depth on
  # top of the in-process header set by api/api.py). Override per deployment
  # if you need additional script-src / connect-src origins.
  csp: ""
  rateLimit:
    enabled: false
    rps: 50          # nginx.ingress.kubernetes.io/limit-rps
    connections: 20  # nginx.ingress.kubernetes.io/limit-connections

# =============================================================================
# SERVICE ACCOUNT
# =============================================================================
serviceAccount:
  create: true
  name: omnivec-api
  annotations: {}
    # azure.workload.identity/client-id: <client-id>


# =============================================================================
# SECURITY (RES-2 — seccomp + future hardening switches)
# =============================================================================
# RES-2: opt-in seccomp profile for parser-heavy workers. Off by default —
# operators must first place the profile JSON
# (helm/omnivec/seccomp/docgrok-parser.json) at
# /var/lib/kubelet/seccomp/<localhostProfile> on every node (DaemonSet or
# node-init script), THEN flip enabled=true. Otherwise pods will fail to
# admit with 'cannot load seccomp profile'.
security:
  seccompProfile:
    enabled: false
    type: Localhost            # Localhost | RuntimeDefault | Unconfined
    localhostProfile: docgrok-parser.json
  # RES-3: cosign image-signing verification. Requires sigstore
  # policy-controller (https://docs.sigstore.dev/policy-controller/) to
  # be installed cluster-wide. When enabled, all Pods admitted into the
  # cluster must reference images signed by the OmniVec build workflow
  # (verified via Fulcio + Rekor + GitHub OIDC).
  imageSigning:
    enabled: false
    # Glob list of image references this policy applies to. Defaults to
    # everything OmniVec ships from omnivecregistry.azurecr.io.
    images: []                 # e.g. ["omnivecregistry.azurecr.io/omnivec-*"]
    # Regex matched against the OIDC subject (= workflow URL + ref). The
    # default accepts builds from any branch / tag of the OmniVec repo's
    # build-images.yml — tighten to refs/heads/main if you want to block
    # accidental dev-branch deploys at admission time.
    subjectRegExp: ""
